<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planos de Assinatura</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container my-5">
        <h2 class="text-center mb-5">Planos de Assinatura</h2>

        <div class="row">

            <!-- Plano Básico -->
            <div class="col-md-4 mb-4">
                <div class="card text-center">
                    <div class="card-header">
                        Básico
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">R$ 19,90/mês</h3>

                        <ul class="list-group list-group-flush my-3">
                            <li class="list-group-item">Acesso limitado</li>
                            <li class="list-group-item">Suporte básico</li>
                            <li class="list-group-item">1 usuário</li>
                        </ul>

                        <a href="#" class="btn btn-primary">Assinar</a>
                    </div>
                </div>
            </div>

            <!-- Plano Intermediário -->
            <div class="col-md-4 mb-4">
                <div class="card text-center border-primary">
                    <div class="card-header bg-primary text-white">
                        Intermediário
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">R$ 49,90/mês</h3>

                        <ul class="list-group list-group-flush my-3">
                            <li class="list-group-item">Acesso completo</li>
                            <li class="list-group-item">Suporte prioritário</li>
                            <li class="list-group-item">5 usuários</li>
                        </ul>

                        <a href="#" class="btn btn-primary">Assinar</a>
                    </div>
                </div>
            </div>

            <!-- Plano Premium -->
            <div class="col-md-4 mb-4">
                <div class="card text-center">
                    <div class="card-header">
                        Premium
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">R$ 99,90/mês</h3>

                        <ul class="list-group list-group-flush my-3">
                            <li class="list-group-item">Tudo do plano anterior</li>
                            <li class="list-group-item">Suporte 24h</li>
                            <li class="list-group-item">Usuários ilimitados</li>
                        </ul>

                        <a href="#" class="btn btn-primary">Assinar</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
